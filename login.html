<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login to King Lottery | Access Your Account</title>
  <meta name="description" content="Log in to your King Lottery account to check results, manage bets, and withdraw winnings." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Raleway:wght@400;500;600;700&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>

<nav id="mainNav" class="navbar navbar-expand-lg fixed-top">
  <div class="container">
    <a class="navbar-brand" href="../index.html"><span class="crown-icon">♛</span>KING LOTTERY<span>EST. 2020 · INDIA</span></a>
    <div class="ms-auto d-flex gap-2">
      <a class="btn-outline-king" href="login.html" style="font-size:0.78rem;padding:8px 20px"><i class="bi bi-person-fill"></i> Login</a>
      <a class="btn-king" href="register.html" style="font-size:0.78rem;padding:8px 20px"><i class="bi bi-crown-fill"></i> Register</a>
    </div>
  </div>
</nav>

<section class="auth-wrap">
  <div class="hero-bg"></div>
  <div class="hero-grid"></div>
  <div class="hero-orb hero-orb-1"></div>

  <div class="container">
    <div class="auth-card glass-card">
      <div class="auth-logo">♛ KING LOTTERY</div>
      <div class="auth-sub">Welcome Back, Champion</div>

      <form id="loginForm" class="form-king">
        <div class="mb-3">
          <label class="form-label">Mobile Number / Email</label>
          <input type="text" class="form-control" placeholder="Enter mobile or email" required>
        </div>
        <div class="mb-3">
          <label class="form-label" style="display:flex;justify-content:space-between">
            Password
            <a href="#" style="font-size:0.78rem;color:var(--gold)">Forgot Password?</a>
          </label>
          <div style="position:relative">
            <input type="password" class="form-control" id="loginPwd" placeholder="Enter your password" required>
            <button type="button" onclick="togglePwd('loginPwd',this)" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer"><i class="bi bi-eye-slash"></i></button>
          </div>
        </div>
        <div class="mb-3 d-flex align-items-center gap-2">
          <input type="checkbox" id="rememberMe" style="background:rgba(255,215,0,0.04);border:1px solid var(--border-gold)">
          <label for="rememberMe" style="font-size:0.83rem;color:var(--text-muted);cursor:pointer">Remember me on this device</label>
        </div>
        <button type="submit" class="btn-king w-100" style="font-size:0.9rem;padding:14px">
          <i class="bi bi-box-arrow-in-right"></i> Login to Account
        </button>
      </form>

      <div class="divider-or">OR CONTINUE WITH</div>

      <div class="d-flex gap-2 mb-4">
        <button class="btn-outline-king w-100" style="font-size:0.8rem;padding:10px;justify-content:center"><i class="bi bi-google me-2"></i>Google</button>
        <button class="btn-outline-king w-100" style="font-size:0.8rem;padding:10px;justify-content:center"><i class="bi bi-phone-fill me-2"></i>OTP</button>
      </div>

      <p style="text-align:center;font-size:0.85rem;color:var(--text-muted)">
        Don't have an account?
        <a href="register.html" style="color:var(--gold);font-weight:700">Create Free Account</a>
      </p>
    </div>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/script.js"></script>
<script>
function togglePwd(id, btn) {
  const input = document.getElementById(id);
  const icon = btn.querySelector('i');
  if (input.type === 'password') {
    input.type = 'text';
    icon.className = 'bi bi-eye';
  } else {
    input.type = 'password';
    icon.className = 'bi bi-eye-slash';
  }
}
</script>
</body>
</html>
