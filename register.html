<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register Free | Join King Lottery Today</title>
  <meta name="description" content="Create your free King Lottery account. Sign up in under 2 minutes and start playing India's most trusted lottery platform." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Raleway:wght@400;500;600;700&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>

<nav id="mainNav" class="navbar navbar-expand-lg fixed-top">
  <div class="container">
    <a class="navbar-brand" href="../index.html"><span class="crown-icon">♛</span>KING LOTTERY<span>EST. 2020 · INDIA</span></a>
    <div class="ms-auto d-flex gap-2">
      <a class="btn-outline-king" href="login.html" style="font-size:0.78rem;padding:8px 20px"><i class="bi bi-person-fill"></i> Login</a>
      <a class="btn-king" href="register.html" style="font-size:0.78rem;padding:8px 20px"><i class="bi bi-crown-fill"></i> Register</a>
    </div>
  </div>
</nav>

<section class="auth-wrap">
  <div class="hero-bg"></div>
  <div class="hero-grid"></div>
  <div class="hero-orb hero-orb-2"></div>

  <div class="container">
    <div class="auth-card glass-card" style="max-width:560px">
      <div class="auth-logo">♛ KING LOTTERY</div>
      <div class="auth-sub">Create Your Free Account</div>

      <!-- Trust badges -->
      <div class="d-flex gap-3 justify-content-center mb-3 flex-wrap">
        <span style="font-size:0.72rem;color:var(--text-muted)"><i class="bi bi-shield-check-fill" style="color:var(--gold)"></i> SSL Secured</span>
        <span style="font-size:0.72rem;color:var(--text-muted)"><i class="bi bi-award-fill" style="color:var(--gold)"></i> Trusted 2.5L+ Members</span>
        <span style="font-size:0.72rem;color:var(--text-muted)"><i class="bi bi-lightning-fill" style="color:var(--gold)"></i> Instant Payouts</span>
      </div>

      <form id="registerForm" class="form-king">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">First Name *</label>
            <input type="text" class="form-control" placeholder="First name" required>
          </div>
          <div class="col-md-6">
            <label class="form-label">Last Name *</label>
            <input type="text" class="form-control" placeholder="Last name" required>
          </div>
          <div class="col-12">
            <label class="form-label">Mobile Number *</label>
            <div style="display:flex;gap:8px">
              <select class="form-select" style="max-width:90px">
                <option>+91</option><option>+1</option><option>+44</option>
              </select>
              <input type="tel" class="form-control" placeholder="Enter 10-digit mobile" required>
            </div>
          </div>
          <div class="col-12">
            <label class="form-label">Email Address *</label>
            <input type="email" class="form-control" placeholder="your@email.com" required>
          </div>
          <div class="col-md-6">
            <label class="form-label">Password *</label>
            <div style="position:relative">
              <input type="password" class="form-control" id="regPassword" placeholder="Min. 8 characters" required minlength="8">
              <button type="button" onclick="togglePwd('regPassword',this)" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer"><i class="bi bi-eye-slash"></i></button>
            </div>
          </div>
          <div class="col-md-6">
            <label class="form-label">Confirm Password *</label>
            <div style="position:relative">
              <input type="password" class="form-control" id="regConfirm" placeholder="Repeat password" required>
              <button type="button" onclick="togglePwd('regConfirm',this)" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer"><i class="bi bi-eye-slash"></i></button>
            </div>
          </div>
          <div class="col-12">
            <label class="form-label">Referral Code <span style="color:var(--text-muted)">(Optional)</span></label>
            <input type="text" class="form-control" placeholder="Enter referral code for bonus">
          </div>
          <div class="col-12">
            <div style="display:flex;gap:10px;align-items:flex-start">
              <input type="checkbox" id="agreeAge" required style="margin-top:4px">
              <label for="agreeAge" style="font-size:0.82rem;color:var(--text-muted)">
                I confirm I am <strong style="color:var(--text-primary)">18 years or older</strong> and agree to the
                <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.
              </label>
            </div>
          </div>
          <div class="col-12">
            <button type="submit" class="btn-king w-100" style="font-size:0.9rem;padding:14px">
              <i class="bi bi-crown-fill"></i> Create Free Account
            </button>
          </div>
        </div>
      </form>

      <div class="divider-or">OR REGISTER WITH</div>
      <button class="btn-outline-king w-100 mb-3" style="font-size:0.85rem;padding:11px;justify-content:center">
        <i class="bi bi-google me-2"></i> Continue with Google
      </button>

      <p style="text-align:center;font-size:0.85rem;color:var(--text-muted)">
        Already have an account?
        <a href="login.html" style="color:var(--gold);font-weight:700">Login Here</a>
      </p>
    </div>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/script.js"></script>
<script>
function togglePwd(id, btn) {
  const input = document.getElementById(id);
  const icon = btn.querySelector('i');
  if (input.type === 'password') { input.type = 'text'; icon.className = 'bi bi-eye'; }
  else { input.type = 'password'; icon.className = 'bi bi-eye-slash'; }
}
</script>
</body>
</html>
